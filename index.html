<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>ورود دیتا - تندی</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
    body { font-family: 'Vazirmatn', Tahoma; margin: 20px; background: #f4f6f9; }
    .container { max-width: 700px; margin: 30px auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #2c3e50; }
    input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; }
    button { background: #27ae60; color: white; cursor: pointer; font-weight: bold; }
    button:hover { background: #219653; }
    .add-btn { background: #3498db; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
    th { background: #f8f9fa; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 ورود اطلاعات فروش تندی</h1>
    
    <input type="date" id="date" placeholder="تاریخ">
    <select id="line">
      <option value="SDA">SDA - لوازم خانگی کوچک</option>
      <option value="Digital">Digital</option>
      <option value="Cosmetics">Cosmetics & Personal Care</option>
    </select>
    <input type="text" id="product" placeholder="نام محصول / خدمت">
    <input type="number" id="revenue" placeholder="مبلغ فروش (تومان)">
    <input type="number" id="units" placeholder="تعداد / واحد">
    <input type="text" id="consultant" placeholder="نام مشاور">

    <button class="add-btn" onclick="addRow()">➕ اضافه کردن به لیست</button>
    <button onclick="downloadCSV()">⬇️ دانلود فایل CSV</button>
    <button onclick="clearData()" style="background:#e74c3c;">🗑️ پاک کردن همه</button>

    <h2>داده‌های وارد شده امروز</h2>
    <table id="dataTable">
      <thead><tr><th>تاریخ</th><th>لاین</th><th>محصول</th><th>فروش</th><th>تعداد</th><th>مشاور</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    let data = [];

    function addRow() {
      const row = {
        date: document.getElementById('date').value || new Date().toISOString().slice(0,10),
        line: document.getElementById('line').value,
        product: document.getElementById('product').value || "بدون نام",
        revenue: document.getElementById('revenue').value || 0,
        units: document.getElementById('units').value || 0,
        consultant: document.getElementById('consultant').value || "نامشخص"
      };
      data.push(row);
      renderTable();
      // پاک کردن فیلدها برای ورود بعدی
      document.getElementById('product').value = '';
      document.getElementById('revenue').value = '';
      document.getElementById('units').value = '';
    }

    function renderTable() {
      const tbody = document.querySelector('#dataTable tbody');
      tbody.innerHTML = '';
      data.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${r.date}</td>
          <td>${r.line}</td>
          <td>${r.product}</td>
          <td>${parseInt(r.revenue).toLocaleString('fa-IR')}</td>
          <td>${r.units}</td>
          <td>${r.consultant}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function downloadCSV() {
      if (data.length === 0) {
        alert("ابتدا حداقل یک رکورد اضافه کنید!");
        return;
      }
      let csv = "date,line,product,revenue,units,consultant\n";
      data.forEach(r => {
        csv += `${r.date},${r.line},${r.product},${r.revenue},${r.units},${r.consultant}\n`;
      });
      
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `sales_tendy_${new Date().toISOString().slice(0,10)}.csv`;
      link.click();
    }

    function clearData() {
      if (confirm("آیا همه داده‌ها پاک شود؟")) {
        data = [];
        renderTable();
      }
    }
  </script>
</body>
</html>
