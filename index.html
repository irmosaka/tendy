<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تندی - داشبورد مدیریتی</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
    body { 
      font-family: 'Vazirmatn', Tahoma, sans-serif; 
      margin: 0; 
      padding: 0; 
      background: linear-gradient(135deg, #f4f6f9, #e8f0f8); 
      color: #2c3e50; 
      text-align: center; 
    }
    .container { max-width: 800px; margin: 80px auto; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    h1 { font-size: 2.8rem; margin-bottom: 10px; color: #2c3e50; }
    .subtitle { font-size: 1.3rem; color: #7f8c8d; margin-bottom: 50px; }
    .card { 
      display: inline-block; 
      width: 320px; 
      margin: 15px; 
      padding: 30px 20px; 
      background: white; 
      border-radius: 16px; 
      box-shadow: 0 6px 20px rgba(0,0,0,0.08); 
      transition: all 0.3s; 
      text-decoration: none; 
      color: inherit;
    }
    .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
    .card h2 { margin: 15px 0 10px 0; color: #3498db; }
    .btn { 
      display: inline-block; 
      margin-top: 20px; 
      padding: 14px 32px; 
      background: #27ae60; 
      color: white; 
      border-radius: 50px; 
      text-decoration: none; 
      font-weight: bold; 
    }
    .btn:hover { background: #219653; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 تندی</h1>
    <p class="subtitle">داشبورد مدیریتی لاین‌های کسب‌وکار</p>

    <a href="dashboard.html" class="card">

      <p>مشاهده KPIها، نمودارها، جدول فروش و تحلیل لاین‌ها</p>
    </a>

    <a href="input.html" class="card">
      <h2>📝 ورود اطلاعات فروش</h2>
      <p>ثبت فروش روزانه توسط مشاوران و دانلود CSV</p>
    </a>

    <a href="README.md" class="btn" target="_blank">📖 مشاهده مستندات</a>
  </div>
</body>
</html>
