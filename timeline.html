        body {
            margin: 0;
            padding: 20px;
            font-family: 'Vazirmatn', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: auto;
        }

        .poster-wrapper {
            overflow: auto;
            padding: 20px;
            background: #fff;
            border-radius: 32px;
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.4);
        }

        .poster {
            width: 7000px;
            height: 4500px;
            background: white;
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            transform: scale(0.22);
            transform-origin: top left;
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.05);
        }

        /* ===== HEADER ===== */
        .header {
            position: absolute;
            top: 100px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 30;
            pointer-events: none;
        }

        .header .brand {
            display: inline-block;
            font-size: 110px;
            font-weight: 900;
            letter-spacing: 16px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            padding: 0 40px;
        }

        .header .brand-sub {
            font-size: 52px;
            font-weight: 300;
            color: var(--slate);
            letter-spacing: 6px;
            margin-top: -10px;
            -webkit-text-fill-color: var(--slate);
        }

        .header h1 {
            font-size: 170px;
            font-weight: 800;
            letter-spacing: -3px;
            color: var(--dark);
            margin: 20px 0 0;
            line-height: 1.1;
        }

        .header h1 .highlight {
            color: var(--primary);
            -webkit-text-fill-color: var(--primary);
        }

        .header .year {
            font-size: 96px;
            font-weight: 900;
            color: var(--primary);
            margin-top: 10px;
            letter-spacing: 8px;
            -webkit-text-fill-color: var(--primary);
        }

        .header .divider-line {
            width: 480px;
            height: 6px;
            margin: 50px auto 0;
            border-radius: 4px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--accent), var(--primary), transparent);
        }

        /* ===== TIMELINE ===== */
        .timeline-container {
            position: absolute;
            top: 380px;
            left: 120px;
            right: 120px;
            height: 3700px;
        }

        .timeline-container svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ===== LEGEND ===== */
        .legend {
            position: absolute;
            bottom: 160px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 70px;
            font-size: 42px;
            z-index: 30;
            pointer-events: none;
            flex-wrap: wrap;
            padding: 0 40px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            padding: 10px 32px 10px 28px;
            border-radius: 60px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .legend-dot {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .legend-item span {
            font-weight: 500;
            color: var(--dark);
            font-size: 38px;
        }

        /* ===== FOOTER ===== */
        .footer {
            position: absolute;
            bottom: 60px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 38px;
            color: var(--slate);
            z-index: 30;
            pointer-events: none;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .footer span {
            color: var(--primary);
            font-weight: 700;
        }

        /* ===== RESPONSIVE HELP ===== */
        @media (max-width: 1200px) {
            .poster {
                transform: scale(0.15);
            }
        }
        @media (max-width: 768px) {
            .poster {
                transform: scale(0.10);
            }
            .poster-wrapper {
                padding: 10px;
            }
        }

        /* Scroll hint */

            text-align: center;

            color: var(--slate);
            padding: 20px 0 10px;
            font-weight: 400;
            letter-spacing: 1px;

            font-size: 16px;
            border: 1px solid #d1d9e6;

        // ============================================================
        //  RENDER
        // ============================================================
        const svg = document.querySelector('svg');

        function createEventNode(ev) {
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('transform', `translate(${ev.x},${ev.y})`);
            g.classList.add('event-node');
            g.setAttribute('filter', 'url(#shadow-light)');
            g.style.cursor = 'pointer';

            // Outer dot
            const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            dot.setAttribute('cx', '0');
            dot.setAttribute('cy', '0');
            dot.setAttribute('r', '36');
            dot.setAttribute('fill', ev.color);
            dot.setAttribute('stroke', '#fff');
            dot.setAttribute('stroke-width', '8');
            g.appendChild(dot);

            // Inner ring
            const inner = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            inner.setAttribute('cx', '0');
            inner.setAttribute('cy', '0');
            inner.setAttribute('r', '20');
            inner.setAttribute('fill', 'rgba(255,255,255,0.92)');
            g.appendChild(inner);

            // Icon
            const icon = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            icon.setAttribute('x', '0');
            icon.setAttribute('y', '10');
            icon.setAttribute('text-anchor', 'middle');
            icon.setAttribute('font-size', '42');
            icon.setAttribute('dominant-baseline', 'central');
            icon.textContent = ev.icon;
            g.appendChild(icon);

            // Date
            const dateTxt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            dateTxt.setAttribute('x', '0');
            dateTxt.setAttribute('y', '-80');
            dateTxt.setAttribute('text-anchor', 'middle');
            dateTxt.setAttribute('font-size', '34');
            dateTxt.setAttribute('font-weight', '700');
            dateTxt.setAttribute('fill', '#1E293B');
            dateTxt.setAttribute('font-family', 'Vazirmatn, sans-serif');
            dateTxt.textContent = ev.date;
            g.appendChild(dateTxt);

            // Title
            const titleTxt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            titleTxt.setAttribute('x', '0');
            titleTxt.setAttribute('y', '80');
            titleTxt.setAttribute('text-anchor', 'middle');
            titleTxt.setAttribute('font-size', '32');
            titleTxt.setAttribute('font-weight', '700');
            titleTxt.setAttribute('fill', '#0F172A');
            titleTxt.setAttribute('font-family', 'Vazirmatn, sans-serif');
            titleTxt.textContent = ev.title;
            g.appendChild(titleTxt);

            // Category (subtitle)
            const catTxt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            catTxt.setAttribute('x', '0');
            catTxt.setAttribute('y', '120');
            catTxt.setAttribute('text-anchor', 'middle');
            catTxt.setAttribute('font-size', '24');
            catTxt.setAttribute('font-weight', '400');
            catTxt.setAttribute('fill', '#64748B');
            catTxt.setAttribute('font-family', 'Vazirmatn, sans-serif');
            catTxt.textContent = ev.cat;
            g.appendChild(catTxt);

            svg.appendChild(g);
        }

        // Render all events
        events.forEach(ev => createEventNode(ev));

        // ============================================================
        //  ZOOM + PAN INTERACTION
        // ============================================================
        const poster = document.getElementById('poster');
        let scale = 0.22;
        let panX = 0,
            panY = 0;
        let isDragging = false,
            startX, startY;

        poster.addEventListener('wheel', function(e) {
            if (e.ctrlKey) {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.02 : 0.02;
                scale = Math.min(Math.max(0.08, scale + delta), 1.2);
                applyTransform();
            }
        }, { passive: false });

        poster.addEventListener('mousedown', function(e) {
            if (e.shiftKey) {
                isDragging = true;
                startX = e.clientX - panX;
                startY = e.clientY - panY;
                poster.style.cursor = 'grabbing';
                e.preventDefault();
            }
        });

        window.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            panX = e.clientX - startX;
            panY = e.clientY - startY;
            applyTransform();
        });

        window.addEventListener('mouseup', function() {
            isDragging = false;
            poster.style.cursor = 'default';
        });

        function applyTransform() {
            poster.style.transform = `scale(${scale}) translate(${panX / scale}px, ${panY / scale}px)`;
            poster.style.transformOrigin = '0 0';
        }

        // Reset with double-click
        poster.addEventListener('dblclick', function() {
            scale = 0.22;
            panX = 0;
            panY = 0;
            applyTransform();
        });

        console.log('%c✅ Tendy Sales Calendar 1406 — ' + events.length + ' events rendered.',
            'color:#33A7B5; font-size:18px; font-weight:700; font-family:Vazirmatn, sans-serif;');
        console.log('💡 Ctrl+Scroll to zoom · Shift+Drag to pan · Double-click to reset');
    </script>
