<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tendy - تقویم فرصت‌های فروش سالانه ۱۴۰۶</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&amp;display=swap');
        
        :root {
            --primary: #33A7B5;
            --dark: #1F2937;
            --gray: #E5E7EB;
            --accent: #FFB703;
            --success: #22C55E;
            --danger: #EF4444;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Vazirmatn', system-ui, -apple-system, sans-serif;
            background: #f8fafc;
            color: var(--dark);
            overflow-x: hidden;
        }
        
        .poster {
            width: 7000px;
            height: 4500px;
            margin: 40px auto;
            background: white;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            position: relative;
            overflow: hidden;
            transform: scale(0.25);
            transform-origin: top left;
        }
        
        .header {
            position: absolute;
            top: 120px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
        }
        
        .title-main {
            font-size: 180px;
            font-weight: 700;
            letter-spacing: -4px;
            color: var(--dark);
            margin: 0;
        }
        
        .title-sub {
            font-size: 72px;
            color: var(--primary);
            margin: 20px 0 0;
            font-weight: 500;
        }
        
        .timeline-container {
            position: absolute;
            top: 420px;
            left: 150px;
            right: 150px;
            height: 3600px;
        }
        
        svg {
            width: 100%;
            height: 100%;
        }
        
        .legend {
            position: absolute;
            bottom: 180px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 80px;
            font-size: 48px;
            z-index: 20;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        
        .legend-dot {
            width: 48px;
            height: 48px;
            border-radius: 50%;
        }
        
        .event-node {
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .event-node:hover circle {
            r: 38;
        }
        
        .footer {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 42px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="poster" id="poster">
        <!-- Header -->
        <div class="header">
            <div style="font-size: 92px; color: var(--primary); font-weight: 700; letter-spacing: 12px;">TENDY</div>
            <h1 class="title-main">تقویم فرصت‌های فروش سالانه</h1>
            <div class="title-sub">۱۴۰۶</div>
            <div style="height: 8px; width: 420px; background: linear-gradient(to right, transparent, var(--primary), transparent); margin: 60px auto 0;"></div>
        </div>

        <!-- SVG Timeline -->
        <div class="timeline-container">
            <svg width="6700" height="3600" viewBox="0 0 6700 3600" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc">
                <title id="title">Tendy Sales Opportunity Timeline 1406</title>
                <desc id="desc">Curved snaking roadmap timeline for annual sales events</desc>
                
                <!-- Background subtle grid -->
                <defs>
                    <pattern id="grid" width="120" height="120" patternUnits="userSpaceOnUse">
                        <path d="M 120 0 L 0 0 0 120" fill="none" stroke="#f1f5f9" stroke-width="1"/>
                    </pattern>
                </defs>
                <rect width="6700" height="3600" fill="url(#grid)"/>
                
                <!-- Main curved path - snake style -->
                <path id="main-path" d="M 400 280 Q 1800 180 2400 620 Q 3100 1100 2800 1650 Q 2500 2250 3600 2100 Q 4800 1950 4600 2650 Q 4400 3200 6200 3050" 
                      fill="none" stroke="#e2e8f0" stroke-width="58" stroke-linecap="round" stroke-linejoin="round"/>
                <path id="main-path-accent" d="M 400 280 Q 1800 180 2400 620 Q 3100 1100 2800 1650 Q 2500 2250 3600 2100 Q 4800 1950 4600 2650 Q 4400 3200 6200 3050" 
                      fill="none" stroke="url(#gradient)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
                
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#33A7B5"/>
                        <stop offset="50%" stop-color="#FFB703"/>
                        <stop offset="100%" stop-color="#33A7B5"/>
                    </linearGradient>
                </defs>
                
                <!-- Event nodes will be inserted here via JS for interactivity and cleanliness -->
            </svg>
        </div>

        <!-- Legend -->
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot" style="background: #33A7B5;"></div>
                <span>رویدادهای ایران</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #1F2937;"></div>
                <span>رویدادهای جهانی</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #22C55E;"></div>
                <span>هوا و فصول</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #FFB703;"></div>
                <span>فناوری</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #EF4444;"></div>
                <span>فصول خرید</span>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            TENDY • تقویم فرصت‌های فروش ۱۴۰۶ • طراحی شده با دقت برای حداکثر فروش
        </div>
    </div>

    <script>
        // Inline data for ~45 key events (scalable to 80+). Extended for realism.
        const events = [
            {id:1, x:420, y:280, date:"۱ فروردین", title:"نوروز", cat:"خانه تکانی، لوازم خانگی", color:"#33A7B5", icon:"🌼"},
            {id:2, x:680, y:240, date:"۵ فروردین", title:"خانه تکانی", cat:"جاروبرقی، شوینده", color:"#22C55E", icon:"🧹"},
            {id:3, x:1050, y:310, date:"۱۳ فروردین", title:"سیزده بدر", cat:"پیک‌نیک، لوازم سفر", color:"#33A7B5", icon:"🌳"},
            {id:4, x:1380, y:480, date:"۱۲ اردیبهشت", title:"روز معلم", cat:"لپ‌تاپ، پرینتر", color:"#33A7B5", icon:"📚"},
            {id:5, x:1720, y:580, date:"۱ خرداد", title:"شروع گرما", cat:"کولر، پنکه", color:"#22C55E", icon:"☀️"},
            {id:6, x:2050, y:720, date:"۱۰ خرداد", title:"کنکور", cat:"لپ‌تاپ، هدفون", color:"#33A7B5", icon:"📝"},

            {id:8, x:2620, y:1250, date:"۱ شهریور", title:"بازگشایی مدارس", cat:"لوازم الکترونیک", color:"#33A7B5", icon:"🏫"},
            {id:9, x:2880, y:1480, date:"۱۰ شهریور", title:"Apple Event", cat:"لپ‌تاپ، ساعت هوشمند", color:"#1F2937", icon:""},
            {id:10, x:3150, y:1720, date:"مرداد", title:"Galaxy Unpacked", cat:"موبایل، تبلت", color:"#1F2937", icon:"🔭"},
            {id:11, x:2450, y:1950, date:"خرداد", title:"WWDC", cat:"نرم‌افزار، مک", color:"#1F2937", icon:"🖥️"},
            {id:12, x:2750, y:2180, date:"سپتامبر", title:"IFA Berlin", cat:"لوازم خانگی", color:"#1F2937", icon:"📺"},
            {id:13, x:3400, y:2050, date:"مرداد", title:"Prime Day", cat:"همه دسته‌ها", color:"#EF4444", icon:"📦"},
            {id:14, x:3900, y:1950, date:"آبان", title:"Black Friday", cat:"همه دسته‌ها", color:"#EF4444", icon:"🛍️"},
            {id:15, x:4250, y:2180, date:"آذر", title:"Cyber Monday", cat:"الکترونیک", color:"#EF4444", icon:"💻"},
            {id:16, x:4550, y:2480, date:"۳۰ آذر", title:"یلدا", cat:"لوازم آشپزخانه", color:"#33A7B5", icon:"🍉"},
            {id:17, x:4850, y:2720, date:"رمضان", title:"رمضان", cat:"لوازم خانگی", color:"#33A7B5", icon:"🌙"},
            {id:18, x:5100, y:2950, date:"محرم", title:"محرم", cat:"صوتی، تلویزیون", color:"#33A7B5", icon:"🕌"},
            {id:19, x:5350, y:3150, date:"اربعین", title:"اربعین", cat:"لوازم سفر", color:"#33A7B5", icon:"🕋"},
            {id:20, x:5600, y:2820, date:"پاییز", title:"آلودگی هوا", cat:"تصفیه هوا", color:"#22C55E", icon:"🌫️"},
            {id:21, x:5900, y:2580, date:"آذر", title:"شروع سرما", cat:"گرمایشی", color:"#22C55E", icon:"❄️"},
            {id:22, x:6200, y:3050, date:"بهار", title:"بارندگی", cat:"جاروبرقی", color:"#22C55E", icon:"☔"},
            {id:23, x:1800, y:1050, date:"تابستان", title:"قطعی برق", cat:"پاوربانک، فن", color:"#EF4444", icon:"⚡"},
            {id:24, x:3800, y:1650, date:"نوامبر", title:"جام جهانی", cat:"تلویزیون", color:"#1F2937", icon:"⚽"},
            {id:25, x:4100, y:1750, date:"مرداد", title:"شروع لیگ فوتبال", cat:"صوتی، تلویزیون", color:"#33A7B5", icon:"🏟️"},
            {id:26, x:1200, y:820, date:"۱۴ بهمن", title:"ولنتاین", cat:"هدیه، اسپیکر", color:"#EF4444", icon:"❤️"},
            {id:27, x:1500, y:1100, date:"بهار", title:"روز مادر", cat:"لوازم آشپزخانه", color:"#33A7B5", icon:"👩"},
            {id:28, x:1700, y:1350, date:"تابستان", title:"روز پدر", cat:"ابزار، گجت", color:"#33A7B5", icon:"👨"},
            {id:29, x:1950, y:1580, date:"۱ ژانویه", title:"سال نو میلادی", cat:"همه دسته‌ها", color:"#1F2937", icon:"🎉"},
            // Additional events to approach 80 total (repeating pattern for density)
            {id:30, x:650, y:420, date:"۲۰ فروردین", title:"شروع فصل بهار", cat:"لوازم خانگی", color:"#22C55E", icon:"🌸"},
            {id:31, x:2200, y:650, date:"۱۵ خرداد", title:"تابستان", cat:"کولر گازی", color:"#22C55E", icon:"🏖️"},
            {id:32, x:2950, y:1380, date:"۵ شهریور", title:"بازگشت مدارس", cat:"مانیتور", color:"#33A7B5", icon:"📖"},
            {id:33, x:3550, y:1850, date:"مهر", title:"جشن پاییز", cat:"جارو", color:"#22C55E", icon:"🍂"},
            {id:34, x:4800, y:2350, date:"آبان", title:"شروع زمستان", cat:"گرم‌کن", color:"#22C55E", icon:"🧥"},
            {id:35, x:5200, y:2650, date:"دی", title:"زمستان عمیق", cat:"پاوربانک", color:"#22C55E", icon:"🌨️"},
            // More tech & shopping
            {id:36, x:2600, y:800, date:"ژوئن", title:"Prime Day", cat:"Air Fryer, Vacuum", color:"#EF4444", icon:"📦"},
            {id:37, x:3800, y:2300, date:"نوامبر", title:"Black Friday", cat:"TV, Laptop", color:"#EF4444", icon:"🛒"},
            {id:38, x:4500, y:1950, date:"دسامبر", title:"Cyber Week", cat:"Gaming", color:"#EF4444", icon:"🎮"},
            {id:39, x:3100, y:1550, date:"سپتامبر", title:"Back to School", cat:"Laptop, Monitor", color:"#1F2937", icon:"🎒"},
            // Extend to ~50+ with more placeholders for density
            {id:40, x:800, y:520, date:"۸ اردیبهشت", title:"روز کارگر", cat:"ابزار برقی", color:"#33A7B5", icon:"🔨"},
            {id:41, x:1250, y:680, date:"۲۵ اردیبهشت", title:"شروع تابستان", cat:"Fan, AC", color:"#22C55E", icon:"🌡️"},
            {id:42, x:1950, y:1150, date:"۱۵ تیر", title:"موج گرما", cat:"Air Purifier", color:"#22C55E", icon:"🥵"},
            {id:43, x:2450, y:1450, date:"مرداد", title:"تعطیلات تابستانی", cat:"Speaker", color:"#33A7B5", icon:"🎧"},
            {id:44, x:2800, y:1720, date:"شهریور", title:"شروع مدارس", cat:"Printer", color:"#33A7B5", icon:"🖨️"},
            {id:45, x:3300, y:1900, date:"مهر", title:"جشن پاییز", cat:"Kitchen Appliances", color:"#22C55E", icon:"🍲"},
        ];

        const svg = document.querySelector('svg');
        
        function createEventNode(event) {
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.classList.add("event-node");
            g.setAttribute("transform", `translate(${event.x} ${event.y})`);
            
            // Connector dot
            const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            dot.setAttribute("cx", "0");
            dot.setAttribute("cy", "0");
            dot.setAttribute("r", "32");
            dot.setAttribute("fill", event.color);
            dot.setAttribute("stroke", "white");
            dot.setAttribute("stroke-width", "9");
            g.appendChild(dot);
            
            // Inner accent
            const inner = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            inner.setAttribute("cx", "0");
            inner.setAttribute("cy", "0");
            inner.setAttribute("r", "18");
            inner.setAttribute("fill", "white");
            g.appendChild(inner);
            
            // Icon text
            const iconText = document.createElementNS("http://www.w3.org/2000/svg", "text");
            iconText.setAttribute("x", "0");
            iconText.setAttribute("y", "8");
            iconText.setAttribute("text-anchor", "middle");
            iconText.setAttribute("font-size", "38");
            iconText.setAttribute("fill", event.color);
            iconText.textContent = event.icon;
            g.appendChild(iconText);
            
            // Date
            const dateText = document.createElementNS("http://www.w3.org/2000/svg", "text");
            dateText.setAttribute("x", "0");
            dateText.setAttribute("y", "-68");
            dateText.setAttribute("text-anchor", "middle");
            dateText.setAttribute("font-size", "32");
            dateText.setAttribute("fill", "#475569");
            dateText.setAttribute("font-weight", "600");
            dateText.textContent = event.date;
            g.appendChild(dateText);
            
            // Title
            const titleText = document.createElementNS("http://www.w3.org/2000/svg", "text");
            titleText.setAttribute("x", "0");
            titleText.setAttribute("y", "68");
            titleText.setAttribute("text-anchor", "middle");
            titleText.setAttribute("font-size", "29");
            titleText.setAttribute("fill", "#1F2937");
            titleText.setAttribute("font-weight", "700");
            titleText.textContent = event.title;
            g.appendChild(titleText);
            
            // Categories
            const catText = document.createElementNS("http://www.w3.org/2000/svg", "text");
            catText.setAttribute("x", "0");
            catText.setAttribute("y", "105");
            catText.setAttribute("text-anchor", "middle");
            catText.setAttribute("font-size", "23");
            catText.setAttribute("fill", "#64748b");
            catText.textContent = event.cat;
            g.appendChild(catText);
            
            // Subtle shadow via filter
            g.setAttribute("filter", "drop-shadow(0 10px 8px rgb(0 0 0 / 0.1))");
            
            svg.appendChild(g);
        }
        
        // Render all events
        events.forEach(event => createEventNode(event));
        
        // Make poster zoomable on desktop (optional interactivity)
        let scale = 0.25;
        document.getElementById('poster').addEventListener('wheel', function(e) {
            if (e.ctrlKey) {
                e.preventDefault();
                scale += e.deltaY * -0.001;
                scale = Math.max(0.15, Math.min(1.2, scale));
                this.style.transform = `scale(${scale})`;
            }
        });
        
        console.log('%c✅ Infographic poster rendered successfully. Scroll to explore the full 7000x4500px canvas.', 'color:#33A7B5; font-size:16px; font-family:monospace');
    </script>
</body>
</html>
