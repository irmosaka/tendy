<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tendy - تقویم فرصت‌های فروش سالانه ۱۴۰۶</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
        
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Vazirmatn', system-ui, sans-serif;
            background: #f8fafc;
        }
        
        .poster {
            width: 7000px;
            height: 4500px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 30px 60px -15px rgb(0 0 0 / 0.25);
            position: relative;
            overflow: hidden;
            border: 20px solid #f1f5f9;
        }
        
        .header {
            position: absolute;
            top: 110px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
        }
        
        .title-main {
            font-size: 172px;
            font-weight: 700;
            letter-spacing: -8px;
            margin: 0;
        }
        
        svg {
            position: absolute;
            top: 420px;
            left: 80px;
        }
        
        .legend {
            position: absolute;
            bottom: 160px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 100px;
            font-size: 48px;
            z-index: 30;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        
        .legend-dot {
            width: 56px;
            height: 56px;
            border-radius: 50%;
        }
        
        .footer {
            position: absolute;
            bottom: 70px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 44px;
            color: #64748b;
        }
        
        .zoom-controls {
            position: fixed;
            top: 30px;
            right: 40px;
            z-index: 1000;
            background: rgba(255,255,255,0.95);
            padding: 14px 24px;
            border-radius: 9999px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.15);
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 32px;
        }
    </style>
</head>
<body>
    <div class="zoom-controls">
        <button onclick="zoomOut()" style="background:none;border:none;cursor:pointer;width:48px;height:48px;font-size:32px;">−</button>
        <span id="zoom-level" style="width:110px;text-align:center;font-weight:600">28%</span>
        <button onclick="zoomIn()" style="background:none;border:none;cursor:pointer;width:48px;height:48px;font-size:32px;">+</button>
        <button onclick="resetZoom()" style="background:none;border:none;cursor:pointer;margin-left:12px;">🔄</button>
    </div>

    <div class="poster" id="poster">
        <!-- Header -->
        <div class="header">
            <div style="font-size: 105px; color: #33A7B5; font-weight: 700; letter-spacing: 22px;">TENDY</div>
            <h1 class="title-main" style="color:#1F2937">تقویم فرصت‌های فروش سالانه</h1>
            <div style="font-size: 82px; color: #33A7B5; margin-top: -20px;">۱۴۰۶</div>
        </div>

        <svg id="timeline-svg" width="6820" height="3550" viewBox="0 0 6820 3550" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="pathGrad" x1="10%" y1="20%" x2="90%" y2="80%">
                    <stop offset="0%" stop-color="#33A7B5"/>
                    <stop offset="45%" stop-color="#FFB703"/>
                    <stop offset="100%" stop-color="#33A7B5"/>
                </linearGradient>
                <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
                    <feOffset dx="4" dy="8" result="offsetblur"/>
                    <feComponentTransfer>
                        <feFuncA type="linear" slope="0.6"/>
                    </feComponentTransfer>
                    <feMerge>
                        <feMergeNode/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>
            
            <!-- Background grid -->
            <rect width="6820" height="3550" fill="#fafafa"/>
            
            <!-- Snaking Path - Improved like Digikala style -->
            <path id="main-path" d="M 420 380 Q 1650 220 2480 680 Q 3250 1150 2780 1680 Q 2450 2250 3620 2180 Q 4950 2050 4720 2680 Q 4550 3180 6380 3050" 
                  fill="none" stroke="#e2e8f0" stroke-width="92" stroke-linecap="round" stroke-linejoin="round"/>
            <path id="highlight-path" d="M 420 380 Q 1650 220 2480 680 Q 3250 1150 2780 1680 Q 2450 2250 3620 2180 Q 4950 2050 4720 2680 Q 4550 3180 6380 3050" 
                  fill="none" stroke="url(#pathGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

        <!-- Legend -->
        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#33A7B5"></div><span>رویدادهای ایران</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:#1F2937"></div><span>رویدادهای جهانی / tech</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:#22C55E"></div><span>فصول و آب‌وهوا</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:#FFB703"></div><span>فناوری</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:#EF4444"></div><span>فصول خرید</span></div>
        </div>

        <div class="footer">
            TENDY • تقویم فرصت‌های فروش اجرایی ۱۴۰۶ • طراحی شده با الهام از گزارش‌های سالانه دیجی‌کالا
        </div>
    </div>

    <script>
        const events = [
            {x:460,y:380,date:"۱ فروردین",title:"نوروز",cat:"خانه تکانی، لوازم خانگی",color:"#33A7B5",icon:"🌼"},
            {x:820,y:290,date:"۵ فروردین",title:"خانه تکانی",cat:"جاروبرقی، Air Fryer",color:"#22C55E",icon:"🧹"},
            {x:1180,y:420,date:"۱۳ فروردین",title:"سیزده بدر",cat:"لوازم سفر",color:"#33A7B5",icon:"🌳"},
            {x:1480,y:620,date:"۱۲ اردیبهشت",title:"روز معلم",cat:"لپ‌تاپ، Printer",color:"#33A7B5",icon:"📚"},
            {x:1850,y:780,date:"۱ خرداد",title:"شروع گرما",cat:"کولر، Fan",color:"#22C55E",icon:"☀️"},
            {x:2180,y:980,date:"۱۰ خرداد",title:"کنکور",cat:"لپ‌تاپ، Charging",color:"#33A7B5",icon:"📝"},
            {x:2520,y:1250,date:"۲۵ تیر",title:"نتایج کنکور",cat:"مانیتور، Laptop",color:"#33A7B5",icon:"🎓"},
            {x:2750,y:1550,date:"۱ شهریور",title:"بازگشایی مدارس",cat:"لوازم دانش‌آموزی",color:"#33A7B5",icon:"🏫"},
            {x:3050,y:1720,date:"شهریور",title:"Apple Event",cat:"مک، Smart Watch",color:"#1F2937",icon:""},
            {x:3380,y:1880,date:"مرداد",title:"Galaxy Unpacked",cat:"گوشی، تبلت",color:"#1F2937",icon:"📱"},
            {x:2650,y:1980,date:"ژوئن",title:"WWDC",cat:"نرم‌افزار",color:"#1F2937",icon:"💻"},
            {x:3750,y:1980,date:"سپتامبر",title:"IFA Berlin",cat:"Home Appliances",color:"#1F2937",icon:"📺"},
            {x:4100,y:1720,date:"Prime Day",title:"Prime Day",cat:"تخفیف بزرگ",color:"#EF4444",icon:"📦"},
            {x:4450,y:2180,date:"آبان",title:"Black Friday",cat:"TV، Vacuum",color:"#EF4444",icon:"🛍️"},
            {x:4750,y:2450,date:"آذر",title:"Cyber Monday",cat:"الکترونیک",color:"#EF4444",icon:"💻"},
            {x:5050,y:2680,date:"۳۰ آذر",title:"یلدا",cat:"Kitchen Appliances",color:"#33A7B5",icon:"🍉"},
            {x:5350,y:2880,date:"رمضان",title:"رمضان",cat:"لوازم خانه",color:"#33A7B5",icon:"🌙"},
            {x:5700,y:3050,date:"محرم",title:"محرم",cat:"صوتی تصویری",color:"#33A7B5",icon:"🕌"},
            {x:6100,y:2780,date:"پاییز",title:"آلودگی هوا",cat:"Air Purifier",color:"#22C55E",icon:"🌫️"},
            {x:6300,y:2520,date:"آذر",title:"شروع سرما",cat:"گرمایشی",color:"#22C55E",icon:"❄️"},
            {x:1950,y:1180,date:"تابستان",title:"قطعی برق",cat:"پاوربانک",color:"#EF4444",icon:"⚡"},
            {x:4250,y:1880,date:"نوامبر",title:"جام جهانی",cat:"تلویزیون",color:"#1F2937",icon:"⚽"},
        ];

        function createEvent(ev) {
            const svg = document.getElementById('timeline-svg');
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("transform", `translate(${ev.x} ${ev.y})`);
            
            // Main circle with shadow
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("r", "46");
            circle.setAttribute("fill", ev.color);
            circle.setAttribute("stroke", "#ffffff");
            circle.setAttribute("stroke-width", "14");
            circle.setAttribute("filter", "url(#shadow)");
            g.appendChild(circle);
            
            // Icon
            const icon = document.createElementNS("http://www.w3.org/2000/svg", "text");
            icon.setAttribute("x", "0");
            icon.setAttribute("y", "14");
            icon.setAttribute("text-anchor", "middle");
            icon.setAttribute("font-size", "52");
            icon.setAttribute("fill", "#ffffff");
            icon.textContent = ev.icon;
            g.appendChild(icon);
            
            // Date box
            const dateBg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            dateBg.setAttribute("x", "-92");
            dateBg.setAttribute("y", "-112");
            dateBg.setAttribute("width", "184");
            dateBg.setAttribute("height", "42");
            dateBg.setAttribute("rx", "8");
            dateBg.setAttribute("fill", "#1F2937");
            g.appendChild(dateBg);
            
            const dateText = document.createElementNS("http://www.w3.org/2000/svg", "text");
            dateText.setAttribute("x", "0");
            dateText.setAttribute("y", "-82");
            dateText.setAttribute("text-anchor", "middle");
            dateText.setAttribute("font-size", "29");
            dateText.setAttribute("fill", "#f1f5f9");
            dateText.setAttribute("font-weight", "700");
            dateText.textContent = ev.date;
            g.appendChild(dateText);
            
            // Title
            const title = document.createElementNS("http://www.w3.org/2000/svg", "text");
            title.setAttribute("x", "0");
            title.setAttribute("y", "88");
            title.setAttribute("text-anchor", "middle");
            title.setAttribute("font-size", "34");
            title.setAttribute("fill", "#1F2937");
            title.setAttribute("font-weight", "700");
            title.textContent = ev.title;
            g.appendChild(title);
            
            // Categories
            const cat = document.createElementNS("http://www.w3.org/2000/svg", "text");
            cat.setAttribute("x", "0");
            cat.setAttribute("y", "125");
            cat.setAttribute("text-anchor", "middle");
            cat.setAttribute("font-size", "25");
            cat.setAttribute("fill", "#64748b");
            cat.textContent = ev.cat;
            g.appendChild(cat);
            
            svg.appendChild(g);
        }
        
        let scale = 0.28;
        const poster = document.getElementById('poster');
        
        function updateZoom() {
            poster.style.transform = `scale(${scale})`;
            poster.style.transformOrigin = "top left";
            document.getElementById('zoom-level').textContent = Math.round(scale * 100) + "%";
        }
        
        function zoomIn() { scale = Math.min(0.95, scale + 0.07); updateZoom(); }
        function zoomOut() { scale = Math.max(0.18, scale - 0.07); updateZoom(); }
        function resetZoom() { scale = 0.28; updateZoom(); }
        
        window.onload = () => {
            events.forEach(ev => createEvent(ev));
            updateZoom();
        };
    </script>
</body>
</html>
