<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tendy - تقویم فرصت‌های فروش سالانه ۱۴۰۶</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
        
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Vazirmatn', system-ui, sans-serif;
            background: #f1f5f9;
        }
        
        .poster {
            width: 7000px;
            height: 4500px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 25px 70px -12px rgb(0 0 0 / 0.3);
            position: relative;
            border: 18px solid #f8fafc;
        }
        
        .header {
            position: absolute;
            top: 90px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 20;
        }
        
        svg {
            position: absolute;
            top: 380px;
            left: 60px;
        }
        
        .legend {
            position: absolute;
            bottom: 140px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 110px;
            font-size: 46px;
            z-index: 30;
        }
        
        .footer {
            position: absolute;
            bottom: 70px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 42px;
            color: #64748b;
        }
        
        .zoom-controls {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 12px 28px;
            border-radius: 9999px;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.15);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="zoom-controls">
        <button onclick="zoomOut()" style="font-size:32px;background:none;border:none;cursor:pointer">−</button>
        <span id="zoom-level" style="font-weight:700; width:110px; text-align:center">28%</span>
        <button onclick="zoomIn()" style="font-size:32px;background:none;border:none;cursor:pointer">+</button>
        <button onclick="resetZoom()" style="margin-left:20px;background:none;border:none;cursor:pointer">🔄 بازنشانی</button>
    </div>

    <div class="poster" id="poster">
        <!-- Header -->
        <div class="header">
            <div style="font-size:112px; color:#33A7B5; font-weight:700; letter-spacing:26px;">TENDY</div>
            <h1 style="font-size:148px; margin:12px 0 8px; font-weight:700; color:#1F2937;">تقویم فرصت‌های فروش سالانه</h1>
            <div style="font-size:88px; color:#33A7B5;">۱۴۰۶</div>
        </div>

        <svg id="timeline" width="6880" height="3580" viewBox="0 0 6880 3580" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="grad" x1="0%" y1="30%" x2="100%" y2="70%">
                    <stop offset="0%" stop-color="#33A7B5"/>
                    <stop offset="50%" stop-color="#FFB703"/>
                    <stop offset="100%" stop-color="#33A7B5"/>
                </linearGradient>
            </defs>
            
            <!-- Smooth snaking path -->
            <path d="M380 420 Q 1380 280 2180 620 Q 2950 980 2650 1580 Q 2420 2150 3550 2080 Q 4750 1980 4650 2550 Q 4550 3050 6520 2920" 
                  fill="none" stroke="#e2e8f0" stroke-width="88" stroke-linecap="round"/>
            <path d="M380 420 Q 1380 280 2180 620 Q 2950 980 2650 1580 Q 2420 2150 3550 2080 Q 4750 1980 4650 2550 Q 4550 3050 6520 2920" 
                  fill="none" stroke="url(#grad)" stroke-width="26" stroke-linecap="round"/>
        </svg>

        <div class="legend">
            <div style="display:flex;align-items:center;gap:28px"><div style="width:52px;height:52px;background:#33A7B5;border-radius:50%"></div><span>ایرانی</span></div>
            <div style="display:flex;align-items:center;gap:28px"><div style="width:52px;height:52px;background:#1F2937;border-radius:50%"></div><span>جهانی</span></div>
            <div style="display:flex;align-items:center;gap:28px"><div style="width:52px;height:52px;background:#22C55E;border-radius:50%"></div><span>هوا</span></div>
            <div style="display:flex;align-items:center;gap:28px"><div style="width:52px;height:52px;background:#FFB703;border-radius:50%"></div><span>تکنولوژی</span></div>
            <div style="display:flex;align-items:center;gap:28px"><div style="width:52px;height:52px;background:#EF4444;border-radius:50%"></div><span>خرید</span></div>
        </div>

        <div class="footer">TENDY • طراحی executive infographic • ۱۴۰۶</div>
    </div>

    <script>
        const events = [
            {x:420,y:420,date:"۱ فروردین",title:"نوروز",cat:"خانه تکانی",color:"#33A7B5",icon:"🌼"},
            {x:720,y:340,date:"۵ فروردین",title:"خانه تکانی",cat:"جارو • Air Fryer",color:"#22C55E",icon:"🧹"},
            {x:1050,y:480,date:"۱۳ فروردین",title:"سیزده بدر",cat:"لوازم سفر",color:"#33A7B5",icon:"🌳"},
            {x:1380,y:680,date:"۱۲ اردیبهشت",title:"روز معلم",cat:"لپ‌تاپ",color:"#33A7B5",icon:"📚"},
            {x:1720,y:820,date:"۱ خرداد",title:"شروع گرما",cat:"کولر • پنکه",color:"#22C55E",icon:"☀️"},
            {x:2050,y:1050,date:"۱۰ خرداد",title:"کنکور",cat:"لپ‌تاپ",color:"#33A7B5",icon:"📝"},
            {x:2350,y:1320,date:"۲۵ تیر",title:"نتایج کنکور",cat:"مانیتور",color:"#33A7B5",icon:"🎓"},
            {x:2620,y:1580,date:"۱ شهریور",title:"بازگشایی مدارس",cat:"لوازم مدرسه",color:"#33A7B5",icon:"🏫"},
            {x:2950,y:1720,date:"شهریور",title:"Apple Event",cat:"مکبوک",color:"#1F2937",icon:""},
            {x:3280,y:1880,date:"مرداد",title:"Galaxy Unpacked",cat:"گلکسی",color:"#1F2937",icon:"📱"},
            {x:2450,y:1980,date:"ژوئن",title:"WWDC",cat:"اپل",color:"#1F2937",icon:"💻"},
            {x:3750,y:1920,date:"سپتامبر",title:"IFA Berlin",cat:"لوازم خانگی",color:"#1F2937",icon:"📺"},
            {x:4100,y:1680,date:"Prime Day",title:"Prime Day",cat:"تخفیف",color:"#EF4444",icon:"📦"},
            {x:4450,y:2150,date:"Black Friday",title:"بلک فرایدی",cat:"TV • Vacuum",color:"#EF4444",icon:"🛍️"},
            {x:4750,y:2420,date:"Cyber Monday",title:"سایبر",cat:"الکترونیک",color:"#EF4444",icon:"💻"},
            {x:5050,y:2650,date:"۳۰ آذر",title:"یلدا",cat:"آشپزخانه",color:"#33A7B5",icon:"🍉"},
            {x:5350,y:2880,date:"رمضان",title:"رمضان",cat:"لوازم",color:"#33A7B5",icon:"🌙"},
            {x:5700,y:3020,date:"محرم",title:"محرم",cat:"صوتی",color:"#33A7B5",icon:"🕌"},
            {x:6100,y:2750,date:"آلودگی",title:"آلودگی هوا",cat:"تصفیه هوا",color:"#22C55E",icon:"🌫️"},
            {x:6300,y:2550,date:"شروع سرما",title:"سرما",cat:"گرمایشی",color:"#22C55E",icon:"❄️"},
        ];

        function addEvent(ev) {
            const svg = document.getElementById('timeline');
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("transform", `translate(${ev.x},${ev.y})`);
            
            // Circle
            const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            c.setAttribute("r", "42");
            c.setAttribute("fill", ev.color);
            c.setAttribute("stroke", "white");
            c.setAttribute("stroke-width", "11");
            g.appendChild(c);
            
            // Icon
            const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
            t.setAttribute("x","0"); t.setAttribute("y","13");
            t.setAttribute("text-anchor","middle");
            t.setAttribute("font-size","46");
            t.setAttribute("fill","white");
            t.textContent = ev.icon;
            g.appendChild(t);
            
            // Date
            const dt = document.createElementNS("http://www.w3.org/2000/svg", "text");
            dt.setAttribute("x","0"); dt.setAttribute("y","-78");
            dt.setAttribute("text-anchor","middle");
            dt.setAttribute("font-size","29");
            dt.setAttribute("fill","#334155");
            dt.setAttribute("font-weight","700");
            dt.textContent = ev.date;
            g.appendChild(dt);
            
            // Title
            const ttl = document.createElementNS("http://www.w3.org/2000/svg", "text");
            ttl.setAttribute("x","0"); ttl.setAttribute("y","78");
            ttl.setAttribute("text-anchor","middle");
            ttl.setAttribute("font-size","31");
            ttl.setAttribute("fill","#1F2937");
            ttl.setAttribute("font-weight","700");
            ttl.textContent = ev.title;
            g.appendChild(ttl);
            
            svg.appendChild(g);
        }
        
        let zoomLevel = 0.28;
        const poster = document.getElementById('poster');
        
        function updateZoom() {
            poster.style.transform = `scale(${zoomLevel})`;
            poster.style.transformOrigin = 'top left';
            document.getElementById('zoom-level').innerText = Math.round(zoomLevel*100) + '%';
        }
        
        function zoomIn() { zoomLevel = Math.min(1, zoomLevel + 0.07); updateZoom(); }
        function zoomOut() { zoomLevel = Math.max(0.18, zoomLevel - 0.07); updateZoom(); }
        function resetZoom() { zoomLevel = 0.28; updateZoom(); }
        
        window.onload = () => {
            events.forEach(addEvent);
            updateZoom();
        };
    </script>
</body>
</html>
